name: Build and push Backend Image

on:
  push:
    # Trigger 1: A push to the main branch
    branches: [ "main", "master" ]
    # Trigger 2: A push with versions-tags (Release)
    tags: [ "v*.*.*" ]

env:
  # This results in: ghcr.io/organisation/reponame
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
          - name: Checkout repository
            uses: actions/checkout@v4
    
          - name: Set up JDK 21
            uses: actions/setup-java@v4
            with:
              java-version: '21'
              distribution: 'temurin'
    
          # Step 1: Install Gradle directly on the runner
          - name: Setup Gradle
            uses: gradle/actions/setup-gradle@v3
            with:
              gradle-version: '9.2.1' # Add the corresponding gradle version (from gradle.properties)
    
          # Step 2: Build with systemwide gradle command not with "gradlew"
          - name: Build with Gradle
            run: gradle build -x test
    
          - name: Log in to the Container registry
            uses: docker/login-action@v3
            with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}
    
          # This action automatically handles tagging (v0.1.0, latest, etc.)
          - name: Extract Docker metadata
            id: meta
            uses: docker/metadata-action@v5
            with:
              images: ${{ env.IMAGE_NAME }}
              tags: |
                type=semver,pattern={{version}}
                type=ref,event=branch
                type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
    
          - name: Build and push Docker image
            uses: docker/build-push-action@v5
            with:
              context: .
              push: true
              tags: ${{ steps.meta.outputs.tags }}
              labels: ${{ steps.meta.outputs.labels }}

    
    

