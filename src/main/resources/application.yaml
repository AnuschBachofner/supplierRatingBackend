spring:
  application:
    name: supplierRatingBackend

openbis:
  # Connection Configuration
  api-url: ${OPENBIS_API_URL}
  user: ${OPENBIS_USER}
  password: ${OPENBIS_PASSWORD}

  # Search Scope Configuration
  search:
    # Space
    default-space: ${OPENBIS_SPACE}

    # Supplier
    supplier-project: ${OPENBIS_PROJECT_SUPPLIER}
    supplier-type: ${OPENBIS_TYPE_SUPPLIER}

    # Order
    order-project: ${OPENBIS_PROJECT_ORDER}
    order-type: ${OPENBIS_TYPE_ORDER}

    # Rating
    rating-project: ${OPENBIS_PROJECT_RATING}
    rating-type: ${OPENBIS_TYPE_RATING}
