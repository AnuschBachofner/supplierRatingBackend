openapi: 3.1.0
info:
  title: Supplier Rating Software API
  description: |
    REST API interface for Supplier Rating Software (SRS).
    The backend acts as a middleware to openBIS (via JSON-RPC).
    
    The data model strictly follows the openBIS Object Types defined in the excel exports:
    - LIEFERANT (Supplier)
    - BESTELLUNG (Order)
    - BESTELLBEWERTUNG (Rating)
    
    IDs in paths refer to the openBIS **PermID** (stable technical identifier).
    Codes in payloads refer to the openBIS **Code** (human readable business identifier).
  version: 1.1.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local Development Server

paths:
  # --------------------------------------------------------------------------
  # SUPPLIERS
  # --------------------------------------------------------------------------
  /suppliers:
    get:
      summary: Retrieve list of all suppliers
      description: Returns a list of all suppliers including their calculated aggregated statistics.
      operationId: getAllSuppliers
      responses:
        '200':
          description: Successful retrieval
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SupplierSummaryDTO'
    post:
      summary: Create new supplier
      description: Creates a new supplier (Type LIEFERANT) in openBIS.
      operationId: createSupplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplierCreateDTO'
      responses:
        '201':
          description: Supplier successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierDetailDTO'

  /suppliers/{id}:
    get:
      summary: Retrieve single supplier
      description: |
        Returns details for a supplier including cumulative rating stats
        and a list of all associated orders.
      operationId: getSupplierById
      parameters:
        - name: id
          in: path
          required: true
          description: The openBIS PermID of the supplier.
          schema:
            type: string
      responses:
        '200':
          description: Supplier found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierDetailDTO'
        '404':
          description: Supplier not found
    put:
      summary: Edit supplier
      description: Updates master data of a supplier.
      operationId: updateSupplier
      parameters:
        - name: id
          in: path
          required: true
          description: The openBIS PermID.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplierUpdateDTO'
      responses:
        '200':
          description: Update successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierDetailDTO'

  # --------------------------------------------------------------------------
  # ORDERS
  # --------------------------------------------------------------------------
  /orders:
    get:
      summary: List orders
      description: Get all orders, optionally filtered by supplier.
      operationId: getOrders
      parameters:
        - name: supplierId
          in: query
          description: Filter by Supplier PermID
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderSummaryDTO'
    post:
      summary: Record new order
      description: Creates a new order (Type BESTELLUNG) and assigns it to a supplier.
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateDTO'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailDTO'

  /orders/{id}:
    get:
      summary: Retrieve order
      description: Returns details of an order including reference to the rating (if available).
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          required: true
          description: The openBIS PermID of the order.
          schema:
            type: string
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailDTO'
        '404':
          description: Order not found
    put:
      summary: Edit order
      description: Updates order data.
      operationId: updateOrder
      parameters:
        - name: id
          in: path
          required: true
          description: The openBIS PermID.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdateDTO'
      responses:
        '200':
          description: Update successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailDTO'

  # --------------------------------------------------------------------------
  # RATINGS
  # --------------------------------------------------------------------------
  /ratings:
    post:
      summary: Submit rating
      description: Creates a rating (Type BESTELLBEWERTUNG) for an existing order.
      operationId: createRating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingCreateDTO'
      responses:
        '201':
          description: Rating created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingDetailDTO'

  /ratings/{id}:
    get:
      summary: Retrieve rating
      description: Returns details of a rating.
      operationId: getRatingById
      parameters:
        - name: id
          in: path
          required: true
          description: The openBIS PermID of the rating.
          schema:
            type: string
      responses:
        '200':
          description: Rating found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingDetailDTO'
        '404':
          description: Rating not found
    put:
      summary: Edit rating
      description: Updates rating criteria or comment.
      operationId: updateRating
      parameters:
        - name: id
          in: path
          required: true
          description: The openBIS PermID.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingUpdateDTO'
      responses:
        '200':
          description: Update successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingDetailDTO'

components:
  schemas:
    # --- COMMON STATS ---
    RatingStats:
      type: object
      description: Calculated average values for a supplier based on the 4 criteria and total score.
      properties:
        avgQuality:
          type: number
          format: float
          description: Average of QUALITAET
          example: 4.5
        avgCost:
          type: number
          format: float
          description: Average of KOSTEN
          example: 3.8
        avgDeadline:
          type: number
          format: float
          description: Average of EINHALTUNG_TERMINE
          example: 5.0
        avgAvailability:
          type: number
          format: float
          description: Average of VERFUEGBARKEIT
          example: 4.2
        avgTotal:
          type: number
          format: float
          description: Average of GESAMTBEWERTUNG
          example: 4.4
        totalRatingCount:
          type: integer
          description: Number of ratings included in this calculation
          example: 12

    # --- SUPPLIER DTOS ---
    SupplierBaseDTO:
      type: object
      required:
        - name
        - zipCode
        - city
        - country
      properties:
        name:
          type: string
          description: Mapped to $NAME
          example: "Acme Corp"
        customerNumber:
          type: string
          description: Mapped to KUNDENNUMMER
          example: "KD-1234"
        addition:
          type: string
          description: Mapped to LIEFERANTEN_ZUSATZ
          example: "Building B"
        street:
          type: string
          description: Mapped to LIEFERANTEN_STRASSE
          example: "Industrial Ave 5"
        poBox:
          type: string
          description: Mapped to LIEFERANTEN_POSTFACH
        country:
          type: string
          description: Mapped to LIEFERANTEN_LAND (Vocabulary LIEFERANTEN_LAND)
          example: "CH"
        zipCode:
          type: string
          description: Mapped to LIEFERANTEN_POSTLEITZAHL
          example: "8005"
        city:
          type: string
          description: Mapped to LIEFERANTEN_ORT
          example: "Zurich"
        website:
          type: string
          description: Mapped to LIEFERANTEN_WEBLINK
          example: "https://acme.com"
        email:
          type: string
          description: Mapped to LIEFERANTEN_EMAIL
        phoneNumber:
          type: string
          description: Mapped to LIEFERANTEN_TELEFON
        vatId:
          type: string
          description: Mapped to MWST
        conditions:
          type: string
          description: Mapped to KONDITIONEN
        customerInfo:
          type: string
          description: Mapped to KUNDENINFORMATION

    SupplierCreateDTO:
      allOf:
        - $ref: '#/components/schemas/SupplierBaseDTO'
        - type: object
          properties:
            code:
              type: string
              description: Optional user defined code. If empty, openBIS generates one.
              example: "SUPPLIER-1"

    SupplierUpdateDTO:
      $ref: '#/components/schemas/SupplierBaseDTO'

    SupplierSummaryDTO:
      allOf:
        - $ref: '#/components/schemas/SupplierBaseDTO'
        - type: object
          properties:
            id:
              type: string
              description: OpenBIS PermID (Stable Identifier)
            code:
              type: string
              description: OpenBIS Code (Business Identifier)
            stats:
              $ref: '#/components/schemas/RatingStats'

    SupplierDetailDTO:
      allOf:
        - $ref: '#/components/schemas/SupplierSummaryDTO'
        - type: object
          properties:
            orders:
              type: array
              description: List of all orders belonging to this supplier
              items:
                $ref: '#/components/schemas/OrderSummaryDTO'

    # --- ORDER DTOS ---
    OrderBaseDTO:
      type: object
      properties:
        name:
          type: string
          description: Mapped to NAME (Short description)
          example: "Lab material Q1"
        mainCategory:
          type: string
          description: Mapped to BESTELLUNG_HK (Vocabulary BESTELLUNGHK)
          example: "BESCHAFFUNG"
        subCategory:
          type: string
          description: Mapped to BESTELLUNG_UK (Vocabulary BESTELLUNGFK)
          example: "MESSMITTEL"
        details:
          type: string
          description: Mapped to BEZEICHNUNG
          example: "50x Precision scales"
        rhythm:
          type: string
          description: Mapped to RYTHMUS
          example: "One-time"
        contactPerson:
          type: string
          description: Mapped to ANSPRECHPERSON
          example: "John Doe"
        contactEmail:
          type: string
          description: Mapped to ANSPRECHPERSON_EMAIL
        contactPhone:
          type: string
          description: Mapped to ANSPRECHPERSON_TELEFON
        reason:
          type: string
          description: Mapped to BESCHAFFUNGSGRUND
        orderMethod:
          type: string
          description: Mapped to BESTELLART
          example: "Email"
        orderedBy:
          type: string
          description: Mapped to BESTELLER (Name of initiator)
        orderDate:
          type: string
          format: date
          description: Mapped to BESTELLDATUM
          example: "2023-12-15"
        deliveryDate:
          type: string
          format: date
          description: Mapped to LIEFERDATUM
        comment:
          type: string
          description: Mapped to KOMMENTAR (General comment)

    OrderCreateDTO:
      allOf:
        - $ref: '#/components/schemas/OrderBaseDTO'
        - type: object
          required:
            - supplierId
          properties:
            supplierId:
              type: string
              description: Reference to supplier (PermID) - mandatory for assignment
              example: "2023050512345"
            code:
              type: string
              description: Optional custom code, otherwise auto-generated

    OrderUpdateDTO:
      $ref: '#/components/schemas/OrderBaseDTO'

    OrderSummaryDTO:
      allOf:
        - $ref: '#/components/schemas/OrderBaseDTO'
        - type: object
          properties:
            id:
              type: string
              description: OpenBIS PermID
            code:
              type: string
              description: OpenBIS Code
            ratingStatus:
              type: string
              enum: [ RATED, PENDING ]
              description: Helps the frontend to show if already rated.

    OrderDetailDTO:
      allOf:
        - $ref: '#/components/schemas/OrderSummaryDTO'
        - type: object
          properties:
            supplierId:
              type: string
              description: PermID of the parent supplier
            supplierName:
              type: string
              description: Name of the parent supplier (for display)
            ratingId:
              type: string
              nullable: true
              description: PermID of the linked rating (if exists), otherwise null.

    # --- RATING DTOS ---
    RatingBaseDTO:
      type: object
      properties:
        quality:
          type: number
          format: float
          description: Mapped to QUALITAET (1-5)
          example: 5.0
        qualityReason:
          type: string
          description: Mapped to GRUND_QUALITAET
        cost:
          type: number
          format: float
          description: Mapped to KOSTEN (1-5)
        costReason:
          type: string
          description: Mapped to KOSTEN_BEGRUENDUNG
        deadline:
          type: number
          format: float
          description: Mapped to EINHALTUNG_TERMINE (1-5)
        deadlineReason:
          type: string
          description: Mapped to EINHALTUNG_TERMINE_GRUND
        availability:
          type: number
          format: float
          description: Mapped to VERFUEGBARKEIT (1-5)
        availabilityReason:
          type: string
          description: Mapped to VERFUEGBARKEIT_BEGRUENDUNG
        totalScore:
          type: number
          format: float
          description: Mapped to GESAMTBEWERTUNG
        comment:
          type: string
          description: Mapped to KOMMENTAR

    RatingCreateDTO:
      allOf:
        - $ref: '#/components/schemas/RatingBaseDTO'
        - type: object
          required:
            - orderId
          properties:
            orderId:
              type: string
              description: PermID of the order this rating belongs to.

    RatingUpdateDTO:
      $ref: '#/components/schemas/RatingBaseDTO'

    RatingDetailDTO:
      allOf:
        - $ref: '#/components/schemas/RatingBaseDTO'
        - type: object
          properties:
            id:
              type: string
              description: PermID of the rating
            code:
              type: string
              description: OpenBIS Code of the rating
            orderId:
              type: string
              description: PermID of the order this rating belongs to.
            supplierId:
              type: string
              description: For navigation to supplier
            supplierName:
              type: string