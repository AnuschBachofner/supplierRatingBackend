# GitLab CI Pipeline für das Backend
# Baut ein Docker-Image und pusht es in die GitLab Registry

stages:
  - build

build-image:
  stage: build

  # Docker-in-Docker: ein Container der Docker-Befehle ausführen kann
  image: docker:latest
  services:
    - docker:dind

  variables:
    DOCKER_TLS_CERTDIR: "/certs"

  script:
    # 1. Bei der GitLab Container Registry einloggen
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    # 2. Docker-Image bauen (nutzt das Dockerfile im gleichen Ordner)
    #    Tag = Registry-Pfad + Git-Commit-Hash als Version
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .

    # 3. Image in die Registry hochladen
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA

  # Pipeline läuft nur wenn auf den main-Branch gepusht wird
  only:
    - main